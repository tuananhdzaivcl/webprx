openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TUANANHPROXY API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: products
  - name: orders
  - name: deposits
  - name: account
  - name: referral
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSession"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSession"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products grouped by category
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List user's orders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Buy a product (deduct balance)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deposits:
    get:
      operationId: listDeposits
      tags: [deposits]
      summary: List user's deposit requests
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Submit a deposit request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /account/summary:
    get:
      operationId: getAccountSummary
      tags: [account]
      summary: Account summary (balance, totals)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountSummary"

  /account/transactions:
    get:
      operationId: listTransactions
      tags: [account]
      summary: List user's wallet transactions
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"

  /referral/summary:
    get:
      operationId: getReferralSummary
      tags: [referral]
      summary: Referral stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralSummary"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/balance:
    post:
      operationId: adminAdjustBalance
      tags: [admin]
      summary: Add or subtract balance for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustBalanceRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: List all deposit requests (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"

  /admin/deposits/{id}/approve:
    post:
      operationId: adminApproveDeposit
      tags: [admin]
      summary: Approve a deposit (credits balance, pays referral 20%)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /admin/deposits/{id}/reject:
    post:
      operationId: adminRejectDeposit
      tags: [admin]
      summary: Reject a deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      summary: List all products (admin)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProductRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertProductRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /admin/products/{id}/keys:
    get:
      operationId: adminListProductKeys
      tags: [admin]
      summary: List proxy keys in stock for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductKeyList"
    post:
      operationId: adminAddProductKeys
      tags: [admin]
      summary: Add proxy keys to product stock (one per line)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductKeysRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductKeyList"

  /admin/products/{id}/keys/{keyId}:
    delete:
      operationId: adminDeleteProductKey
      tags: [admin]
      summary: Delete a single (unused) proxy key
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: keyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"

  /admin/stats:
    get:
      operationId: adminStats
      tags: [admin]
      summary: Admin overview stats
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Ok:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        referralCode:
          type: string
          nullable: true

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    UserSession:
      type: object
      required: [id, username, balance, isAdmin, referralCode]
      properties:
        id:
          type: integer
        username:
          type: string
        balance:
          type: number
        isAdmin:
          type: boolean
        referralCode:
          type: string
        referredBy:
          type: string
          nullable: true

    Category:
      type: object
      required: [id, name, slug, products]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"

    Product:
      type: object
      required: [id, categoryId, categoryName, name, price, stock, sold, imageUrl, active]
      properties:
        id:
          type: integer
        categoryId:
          type: integer
        categoryName:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        stock:
          type: integer
        sold:
          type: integer
        imageUrl:
          type: string
        active:
          type: boolean

    UpsertProductRequest:
      type: object
      required: [categoryId, name, price, stock, imageUrl]
      properties:
        categoryId:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        stock:
          type: integer
        imageUrl:
          type: string
        active:
          type: boolean

    Order:
      type: object
      required: [id, productId, productName, price, status, code, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        status:
          type: string
        code:
          type: string
        createdAt:
          type: string

    CreateOrderRequest:
      type: object
      required: [productId]
      properties:
        productId:
          type: integer

    Deposit:
      type: object
      required: [id, userId, username, amount, status, note, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        username:
          type: string
        amount:
          type: number
        status:
          type: string
        note:
          type: string
        createdAt:
          type: string

    CreateDepositRequest:
      type: object
      required: [amount, note]
      properties:
        amount:
          type: number
        note:
          type: string

    Transaction:
      type: object
      required: [id, type, amount, balanceAfter, description, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        amount:
          type: number
        balanceAfter:
          type: number
        description:
          type: string
        createdAt:
          type: string

    AccountSummary:
      type: object
      required: [balance, totalDeposited, totalSpent, ordersCount]
      properties:
        balance:
          type: number
        totalDeposited:
          type: number
        totalSpent:
          type: number
        ordersCount:
          type: integer

    ReferralSummary:
      type: object
      required: [referralCode, referralLink, referredCount, totalCommission, recentReferrals]
      properties:
        referralCode:
          type: string
        referralLink:
          type: string
        referredCount:
          type: integer
        totalCommission:
          type: number
        recentReferrals:
          type: array
          items:
            $ref: "#/components/schemas/ReferralEntry"

    ReferralEntry:
      type: object
      required: [username, joinedAt, totalDeposited, commissionEarned]
      properties:
        username:
          type: string
        joinedAt:
          type: string
        totalDeposited:
          type: number
        commissionEarned:
          type: number

    AdminUser:
      type: object
      required: [id, username, balance, isAdmin, referralCode, totalDeposited, ordersCount, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        balance:
          type: number
        isAdmin:
          type: boolean
        referralCode:
          type: string
        referredBy:
          type: string
          nullable: true
        totalDeposited:
          type: number
        ordersCount:
          type: integer
        createdAt:
          type: string

    AdjustBalanceRequest:
      type: object
      required: [amount, reason]
      properties:
        amount:
          type: number
          description: Positive to add, negative to subtract
        reason:
          type: string

    ProductKey:
      type: object
      required: [id, productId, keyValue, isUsed, createdAt]
      properties:
        id:
          type: integer
        productId:
          type: integer
        keyValue:
          type: string
        isUsed:
          type: boolean
        usedByOrderId:
          type: integer
          nullable: true
        createdAt:
          type: string
        usedAt:
          type: string
          nullable: true

    ProductKeyList:
      type: object
      required: [productId, totalKeys, availableKeys, usedKeys, keys]
      properties:
        productId:
          type: integer
        totalKeys:
          type: integer
        availableKeys:
          type: integer
        usedKeys:
          type: integer
        keys:
          type: array
          items:
            $ref: "#/components/schemas/ProductKey"

    AddProductKeysRequest:
      type: object
      required: [keys]
      properties:
        keys:
          type: string
          description: Newline-separated list of proxy keys

    AdminStats:
      type: object
      required: [totalUsers, totalRevenue, pendingDeposits, totalOrders, recentOrders]
      properties:
        totalUsers:
          type: integer
        totalRevenue:
          type: number
        pendingDeposits:
          type: integer
        totalOrders:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
