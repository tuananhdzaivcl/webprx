kind = "web"
previewPath = "/"
title = "TUANANHPROXY"
version = "1.0.0"
id = "artifacts/tuananhproxy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21782

[services.development]
run = "pnpm --filter @workspace/tuananhproxy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tuananhproxy", "run", "build" ]
publicDir = "artifacts/tuananhproxy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21782"
BASE_PATH = "/"
